uniform vec2 u_resolution;
uniform vec2 u_mouse;
uniform float u_time;

    vec2 p = uv * 2.0 - 1.0;
    p.x *= u_resolution.x / u_resolution.y;
    
    // Интерактивность мыши: сдвигаем координаты
    vec2 mouse = u_mouse * 2.0 - 1.0;
    p += mouse * 0.5;

    // Время для анимации
    float t = u_time * 1.5;
    
    // Волны и течение с участием мыши
    for(float i = 1.0; i < 5.0; i++) {
        p.x += 0.4 / i * cos(i * 2.5 * p.y + t);
        p.y += 0.4 / i * cos(i * 1.5 * p.x + t * 0.8 + mouse.x * 2.0);
    }
    
    // Расчёт цвета
    float r = cos(p.x + p.y + 1.0) * 0.5 + 0.5;
    float g = sin(p.x + p.y + 1.0) * 0.5 + 0.5;
    float b = (sin(p.x + t) + cos(p.y + t)) * 0.5 + 0.5;

    // Apple-like палитра (Big Sur / Monterey)
    vec3 bg = vec3(0.05, 0.0, 0.15);
    vec3 pPink = vec3(0.9, 0.2, 0.5);
    vec3 pCyan = vec3(0.0, 0.7, 1.0);
    vec3 pPurple = vec3(0.4, 0.0, 0.9);

    vec3 color = bg;
    color = mix(color, pPink, r * 0.7);
    color = mix(color, pCyan, g * 0.7);
    color = mix(color, pPurple, b * 0.7);
    
    // Свечение за курсором мыши
    float mouseDist = length(uv - u_mouse);
    color += vec3(0.2, 0.4, 0.8) * smoothstep(0.5, 0.0, mouseDist) * 0.8;

    // Добавляем плёночный шум (grain) чтобы при 0px Blur фон казался четким и текстурным
    float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233))) * 43758.5453);
    color += grain * 0.04;

    gl_FragColor = vec4(color, 1.0);
